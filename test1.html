        <h1>JOJO 的奇妙冒險：不滅鑽石</h1>
        <p>第四部《不滅鑽石》將舞台縮小到「杜王町」這個小鎮，風格從壯闊的公路旅行轉向充滿生活感的懸疑劇。</p>
        
        <h3>核心分析：</h3>
        <ul>
            <li><strong>色彩與美學：</strong> 杜王町的天空經常是黃色的，象徵著平靜生活下的不安與異樣感。</li>
            <li><strong>反派的特殊性：</strong> <span class="highlight">吉良吉影</span> 與追求統治世界的反派不同，他只想過「平靜的生活」，這種極端的平凡感使其成為最具魅力的反派之一。</li>
            <li><strong>黃金精神：</strong> 強調社區鄰里間的羈絆，平凡人也能擁有守護家園的覺悟。</li>
        </ul>
